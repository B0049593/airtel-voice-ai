<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airtel Voice AI</title>
  <meta name="description" content="Airtel Voice AI Assistant powered by Deepgram">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --airtel-red: #ED1C24;
      --airtel-red-dark: #C41920;
      --airtel-red-light: #FF4C52;
      --white: #FFFFFF;
      --bg: #F8F9FA;
      --text-dark: #1A1A1A;
      --text-gray: #4A4A4A;
      --text-light: #8E8E93;
      --border: #E5E5EA;
      --shadow: rgba(0, 0, 0, 0.05);
      --pulse-color: rgba(237, 28, 36, 0.2);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-dark);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      background: var(--white);
      height: 64px;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      border-bottom: 1px solid var(--border);
      z-index: 100;
      flex-shrink: 0;
    }
    .header-logo {
      height: 28px;
      width: auto;
      object-fit: contain;
    }
    .header h1 {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text-dark);
      letter-spacing: -0.01em;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .header h1 span { color: var(--airtel-red); font-weight: 800; }
    
    .status-badge {
      margin-left: auto;
      font-size: 0.7rem;
      font-weight: 700;
      padding: 0.35rem 0.75rem;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      text-transform: uppercase;
    }
    .status-badge.connected { background: #E3F2FD; color: #1976D2; }
    .status-badge.disconnected { background: #FFF5F5; color: #E53935; }
    .status-badge .dot { width: 8px; height: 8px; border-radius: 50%; }
    .status-badge.connected .dot { background: #1976D2; animation: badgePulse 2s infinite; }
    .status-badge.disconnected .dot { background: #E53935; }

    @keyframes badgePulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(25, 118, 210, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(25, 118, 210, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(25, 118, 210, 0); }
    }

    /* ── Dashboard ── */
    .dashboard {
      flex: 1;
      display: flex;
      overflow: hidden;
      position: relative;
    }

    /* ── Voice Panel ── */
    .voice-panel {
      flex: 1;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      background: var(--white);
    }

    .mic-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3rem;
    }

    .mic-visual-container {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .pulse-rings {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 100%; height: 100%;
      pointer-events: none;
    }

    .ring {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border-radius: 50%;
      background: var(--pulse-color);
      opacity: 0;
      transform: scale(0.4);
    }

    .listening .ring { animation: pulseOut 2s infinite cubic-bezier(0.25, 1, 0.5, 1); }
    .speaking .ring { animation: pulseOut 1.5s infinite cubic-bezier(0.25, 1, 0.5, 1); }
    .ring:nth-child(2) { animation-delay: 0.5s; }
    .ring:nth-child(3) { animation-delay: 1s; }

    @keyframes pulseOut {
      0% { transform: scale(0.4); opacity: 0.8; }
      100% { transform: scale(1.5); opacity: 0; }
    }

    .mic-btn {
      position: relative;
      z-index: 10;
      width: 80px; height: 80px;
      border-radius: 50%;
      border: none;
      background: var(--white);
      color: var(--airtel-red);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 8px 25px rgba(0,0,0,0.08);
      transition: all 0.3s ease;
      outline: none;
    }
    .mic-btn.active {
      background: var(--airtel-red);
      color: var(--white);
      box-shadow: 0 0 20px rgba(237, 28, 36, 0.4);
    }
    .speaking .mic-btn.active {
      background: #1976D2;
      box-shadow: 0 0 20px rgba(25, 118, 210, 0.4);
    }
    .mic-btn svg { width: 32px; height: 32px; }

    .voice-label {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--text-gray);
      min-height: 1.5em;
    }

    /* ── Chat Panel ── */
    .chat-panel {
      width: 400px;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: #F4F4F7;
      border-left: 1px solid var(--border);
    }

    .chat-header {
      padding: 1.25rem 1.5rem;
      background: var(--white);
      border-bottom: 1px solid var(--border);
    }
    .chat-header h2 { font-size: 0.75rem; font-weight: 700; text-transform: uppercase; color: var(--text-light); }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: #D1D1D6; border-radius: 4px; }

    .msg { display: flex; flex-direction: column; max-width: 85%; animation: msgFade 0.3s ease; }
    .msg.agent { align-self: flex-start; }
    .msg.user { align-self: flex-end; }
    .msg.system { align-self: center; opacity: 0.5; font-size: 0.75rem; }

    .bubble { padding: 0.8rem 1.1rem; font-size: 0.9rem; line-height: 1.4; border-radius: 16px; }
    .agent .bubble { background: var(--white); color: var(--text-dark); border-bottom-left-radius: 4px; }
    .user .bubble { background: var(--airtel-red); color: var(--white); border-bottom-right-radius: 4px; }

    @keyframes msgFade { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Debug Panel ── */
    .debug-panel {
      position: absolute;
      bottom: 20px;
      right: 420px;
      width: 300px;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      border-radius: 12px;
      color: #00FF00;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.7rem;
      padding: 12px;
      z-index: 1000;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.1);
      transition: all 0.3s ease;
      max-height: 400px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .debug-panel.collapsed { height: 40px; overflow: hidden; }
    .debug-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      padding-bottom: 6px;
      cursor: pointer;
    }
    .debug-header h3 { font-size: 0.75rem; text-transform: uppercase; color: #FFF; }
    .debug-logs {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .debug-log-entry { display: flex; gap: 8px; }
    .debug-tag { font-weight: bold; min-width: 60px; }
    .debug-msg { color: #DDD; }

    @media (max-width: 1024px) {
      .debug-panel { right: 20px; bottom: 20px; }
    }el { width: 100%; height: 600px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <img src="https://www.airtel.in/assets/images/airtel-logo-white.svg" alt="" class="header-logo" style="filter: invert(1);" onerror="this.style.display='none'">
    <h1><span>airtel</span> Vaani 2.0</h1>
    <div id="statusBadge" class="status-badge disconnected">
      <span class="dot"></span>
      <span id="statusText">Disconnected</span>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dashboard" id="dashboard">
    <!-- Left Panel: Voice/Mic -->
    <div class="voice-panel">
      <div class="mic-section">
        <div class="mic-visual-container">
          <div class="pulse-rings">
            <div class="ring"></div>
            <div class="ring"></div>
            <div class="ring"></div>
          </div>
          <button class="mic-btn" id="micBtn" aria-label="Start speaking">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
              <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
              <line x1="12" x2="12" y1="19" y2="22"/>
            </svg>
          </button>
        </div>
        <div class="voice-label" id="micLabel">Tap to speak</div>
      </div>
    </div>

    <!-- Right Panel: Chat -->
    <div class="chat-panel">
      <div class="chat-header">
        <h2>Live Transcription</h2>
      </div>
      <div class="chat-messages" id="chat">
        <!-- Messages appear here -->
      </div>
    </div>

    <!-- Developer Debug Panel -->
    <div class="debug-panel" id="debugPanel">
      <div class="debug-header" id="debugToggle">
        <h3>Dev Debug Console</h3>
        <span id="debugChevron">▾</span>
      </div>
      <div class="debug-logs" id="debugLogs">
        <!-- Live logs will appear here -->
      </div>
    </div>
  </div>

<script>
(function() {
  // ── Configuration ──
  const debugMode = true; // Set to true for dev testing

  // ── DOM ──
  const dashboard = document.getElementById('dashboard');
  const micBtn    = document.getElementById('micBtn');
  const micLabel  = document.getElementById('micLabel');
  const chatEl    = document.getElementById('chat');
  const statusBadge = document.getElementById('statusBadge');
  const statusText  = document.getElementById('statusText');
  const debugPanel  = document.getElementById('debugPanel');
  const debugLogs   = document.getElementById('debugLogs');
  const debugToggle = document.getElementById('debugToggle');
  const debugChevron = document.getElementById('debugChevron');

  // ── State ──
  let ws = null;
  let isListening = false;
  let isAgentSpeaking = false;
  let audioContext = null;
  let mediaStream = null;
  let processor = null;
  let wsConnected = false;

  // Audio playback
  let playCtx = null;
  const OUTPUT_SAMPLE_RATE = 24000;
  let nextPlayTime = 0;

  // ── Debug Logger ──
  function log(tag, message, isError = false) {
    if (!debugMode) return;
    const time = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const fullMsg = `[${tag}] ${message}`;
    
    // Console log
    if (isError) console.error(fullMsg);
    else console.log(`%c${time} %c${fullMsg}`, 'color: #888', 'color: #00FF00');

    // Panel log
    const entry = document.createElement('div');
    entry.className = 'debug-log-entry';
    entry.innerHTML = `<span style="color:#888">${time}</span> <span class="debug-tag" style="color:${isError?'#FF4C52':'#00FF00'}">[${tag}]</span> <span class="debug-msg">${message}</span>`;
    debugLogs.prepend(entry);
    if (debugLogs.children.length > 50) debugLogs.lastChild.remove();
  }

  // Debug Panel Toggle
  debugToggle.addEventListener('click', () => {
    const isCollapsed = debugPanel.classList.toggle('collapsed');
    debugChevron.textContent = isCollapsed ? '▴' : '▾';
  });

  // ── WebSocket ──
  function connectWs() {
    log('WS', 'Connecting to server...');
    return new Promise((resolve) => {
      if (ws && ws.readyState === WebSocket.OPEN) return resolve(true);

      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}`);
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        wsConnected = true;
        setStatus(true);
        log('WS', 'Connected successfully');
        resolve(true);
      };

      ws.onmessage = (evt) => {
        if (evt.data instanceof ArrayBuffer) {
          handleAudioData(evt.data);
        } else {
          try {
            const msg = JSON.parse(evt.data);
            handleEvent(msg);
          } catch (e) {
            log('ERROR', 'Failed to parse WS message');
          }
        }
      };

      ws.onclose = () => {
        wsConnected = false;
        setStatus(false);
        log('WS', 'Connection closed');
        resetToIdle();
      };

      ws.onerror = (e) => {
        log('ERROR', 'WebSocket error occurred', true);
        resolve(false);
      };
    });
  }

  function setStatus(connected) {
    statusBadge.className = 'status-badge ' + (connected ? 'connected' : 'disconnected');
    statusText.textContent = connected ? 'Online' : 'Offline';
    log('STATE', connected ? 'System Online' : 'System Offline');
  }

  function handleEvent(msg) {
    switch (msg.type) {
      case 'ConversationText':
        log('AI', `${msg.role}: ${msg.content.substring(0, 40)}...`);
        addMessage(msg.role === 'assistant' ? 'agent' : 'user', msg.content);
        break;
      case 'UserStartedSpeaking':
        log('STT', 'User speech detected (Barge-in)');
        stopPlayback();
        break;
      case 'Error':
        log('ERROR', msg.message, true);
        addMessage('system', 'Error: ' + msg.message);
        break;
      default:
        log('WS', `Event received: ${msg.type}`);
    }
  }

  function addMessage(role, text) {
    const wrapper = document.createElement('div');
    wrapper.className = 'msg ' + role;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrapper.appendChild(bubble);
    chatEl.appendChild(wrapper);
    requestAnimationFrame(() => chatEl.scrollTop = chatEl.scrollHeight);
  }

  // ── Audio Flow ──
  async function startListening() {
    log('MIC', 'Requesting microphone access...');
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true }
      });
      log('MIC', 'Access granted. Starting capture.');
      
      audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
      const source = audioContext.createMediaStreamSource(mediaStream);
      processor = audioContext.createScriptProcessor(4096, 1, 1);
      
      processor.onaudioprocess = (e) => {
        if (!isListening || !ws || ws.readyState !== WebSocket.OPEN) return;
        const float32 = e.inputBuffer.getChannelData(0);
        const int16 = new Int16Array(float32.length);
        for (let i = 0; i < float32.length; i++) {
          const s = Math.max(-1, Math.min(1, float32[i]));
          int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }
        ws.send(int16.buffer);
      };

      source.connect(processor);
      processor.connect(audioContext.destination);

      isListening = true;
      log('STATE', 'Listening mode active');
      updateUIState();
    } catch (err) {
      log('ERROR', 'Microphone access failed', true);
      resetToIdle();
    }
  }

  function handleAudioData(buffer) {
    if (!isListening) return;
    
    const ctx = ensurePlayCtx();
    const view = new DataView(buffer);
    const float32 = new Float32Array(buffer.byteLength / 2);
    for (let i = 0; i < float32.length; i++) float32[i] = view.getInt16(i * 2, true) / 32768;

    const audioBuf = ctx.createBuffer(1, float32.length, OUTPUT_SAMPLE_RATE);
    audioBuf.copyToChannel(float32, 0);
    const src = ctx.createBufferSource();
    src.buffer = audioBuf;
    src.connect(ctx.destination);

    const now = ctx.currentTime;
    if (nextPlayTime < now) {
      nextPlayTime = now + 0.1;
      log('TTS', 'Playback buffer initialized');
    }
    
    src.start(nextPlayTime);
    
    if (!isAgentSpeaking) {
      isAgentSpeaking = true;
      log('TTS', 'Vaani started speaking');
      updateUIState();
    }

    src.onended = () => {
      if (ctx.currentTime >= nextPlayTime - 0.1) {
        isAgentSpeaking = false;
        log('TTS', 'Playback finished');
        updateUIState();
      }
    };

    nextPlayTime += audioBuf.duration;
  }

  function ensurePlayCtx() {
    if (!playCtx || playCtx.state === 'closed') {
      playCtx = new AudioContext({ sampleRate: OUTPUT_SAMPLE_RATE });
      nextPlayTime = 0;
    }
    if (playCtx.state === 'suspended') playCtx.resume();
    return playCtx;
  }

  function stopPlayback() {
    if (playCtx) { 
      log('TTS', 'Playback interrupted');
      playCtx.close(); 
      playCtx = null; 
    }
    nextPlayTime = 0;
    isAgentSpeaking = false;
    updateUIState();
  }

  function resetToIdle() {
    log('STATE', 'Resetting to Idle');
    isListening = false;
    isAgentSpeaking = false;
    if (processor) { processor.disconnect(); processor = null; }
    if (audioContext) { audioContext.close(); audioContext = null; }
    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    stopPlayback();
    updateUIState();
  }

  function updateUIState() {
    dashboard.classList.remove('listening', 'speaking');
    micBtn.classList.remove('active');
    
    if (!isListening) {
      micLabel.textContent = 'Tap to speak';
    } else if (isAgentSpeaking) {
      dashboard.classList.add('speaking');
      micBtn.classList.add('active');
      micLabel.textContent = 'Vaani is speaking...';
    } else {
      dashboard.classList.add('listening');
      micBtn.classList.add('active');
      micLabel.textContent = 'Listening...';
    }
  }

  micBtn.addEventListener('click', async () => {
    log('MIC', 'Mic button clicked');
    if (isListening) {
      resetToIdle();
    } else {
      micLabel.textContent = 'Connecting...';
      const success = await connectWs();
      if (success) {
        startListening();
      } else {
        micLabel.textContent = 'Connection Failed';
      }
    }
  });

})();
</script>

</body>
</html>
