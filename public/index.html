<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airtel Voice AI</title>
  <meta name="description" content="Airtel Voice AI Assistant powered by Deepgram">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --airtel-red: #ED1C24;
      --airtel-red-dark: #C41920;
      --airtel-red-light: #FF4C52;
      --white: #FFFFFF;
      --bg: #F8F9FA;
      --text-dark: #1A1A1A;
      --text-gray: #4A4A4A;
      --text-light: #8E8E93;
      --border: #E5E5EA;
      --shadow: rgba(0, 0, 0, 0.05);
      --bubble-user: #ED1C24;
      --bubble-agent: #FFFFFF;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text-dark);
      height: 100vh;
      overflow: hidden; /* Prevent page scrolling */
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    .header {
      background: var(--white);
      height: 64px;
      padding: 0 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border-bottom: 1px solid var(--border);
      z-index: 100;
      flex-shrink: 0;
    }
    .header-logo {
      height: 24px;
    }
    .header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-dark);
      letter-spacing: -0.02em;
    }
    .header h1 span { color: var(--airtel-red); }
    
    .status-badge {
      margin-left: auto;
      font-size: 0.75rem;
      font-weight: 600;
      padding: 0.4rem 0.8rem;
      border-radius: 20px;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.03em;
    }
    .status-badge.connected { background: #E3F2FD; color: #1976D2; }
    .status-badge.disconnected { background: #FFF5F5; color: #E53935; }
    .status-badge .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
    }
    .status-badge.connected .dot { background: #1976D2; animation: pulse 2s infinite; }
    .status-badge.disconnected .dot { background: #E53935; }

    @keyframes pulse {
      0% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(25, 118, 210, 0.7); }
      70% { transform: scale(1); box-shadow: 0 0 0 6px rgba(25, 118, 210, 0); }
      100% { transform: scale(0.95); box-shadow: 0 0 0 0 rgba(25, 118, 210, 0); }
    }

    /* ── Layout ── */
    .dashboard {
      flex: 1;
      display: flex;
      flex-direction: row;
      overflow: hidden;
      background: var(--white);
    }

    /* ── Left Panel (Voice) ── */
    .voice-panel {
      width: 50%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      background: var(--white);
      border-right: 1px solid var(--border);
    }

    .mic-container {
      position: relative;
      width: 300px;
      height: 300px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2rem;
    }

    .mic-rings {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 120px; height: 120px;
      z-index: 1;
    }

    .ring {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      border-radius: 50%;
      background: var(--airtel-red);
      opacity: 0;
      transform: scale(1);
      transition: all 0.1s ease-out;
    }

    .mic-btn {
      position: relative;
      z-index: 10;
      width: 120px; height: 120px;
      border-radius: 50%;
      border: none;
      background: var(--white);
      color: var(--airtel-red);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 10px 40px rgba(0,0,0,0.08);
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .mic-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 15px 50px rgba(0,0,0,0.12);
    }

    .mic-btn.active {
      background: var(--airtel-red);
      color: var(--white);
      transform: scale(0.95);
    }

    .mic-btn svg { width: 48px; height: 48px; }

    .voice-label {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-gray);
      text-align: center;
      transition: all 0.3s;
    }
    .voice-label.active { color: var(--airtel-red); }

    /* ── Right Panel (Chat) ── */
    .chat-panel {
      width: 50%;
      height: 100%;
      display: flex;
      flex-direction: column;
      background: var(--bg);
      position: relative;
    }

    .chat-header {
      padding: 1.5rem 2rem;
      background: var(--white);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .chat-header h2 {
      font-size: 0.9rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-light);
    }

    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
      scroll-behavior: smooth;
    }

    .chat-messages::-webkit-scrollbar { width: 6px; }
    .chat-messages::-webkit-scrollbar-track { background: transparent; }
    .chat-messages::-webkit-scrollbar-thumb { background: #D1D1D6; border-radius: 10px; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 80%;
      animation: slideUp 0.4s cubic-bezier(0.23, 1, 0.32, 1);
    }
    .msg.agent { align-self: flex-start; }
    .msg.user { align-self: flex-end; }
    .msg.system { 
      align-self: center; 
      max-width: 100%;
      margin: 1rem 0;
    }

    .bubble {
      padding: 1rem 1.25rem;
      font-size: 0.95rem;
      line-height: 1.5;
      border-radius: 18px;
      position: relative;
    }

    .agent .bubble {
      background: var(--white);
      color: var(--text-dark);
      border-bottom-left-radius: 4px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.03);
    }

    .user .bubble {
      background: var(--airtel-red);
      color: var(--white);
      border-bottom-right-radius: 4px;
      box-shadow: 0 4px 15px rgba(237, 28, 36, 0.2);
    }

    .system .bubble {
      background: rgba(0,0,0,0.04);
      color: var(--text-light);
      font-size: 0.8rem;
      font-weight: 500;
      padding: 0.4rem 1rem;
      border-radius: 20px;
    }

    .msg-label {
      font-size: 0.7rem;
      font-weight: 700;
      margin-bottom: 0.35rem;
      color: var(--text-light);
      text-transform: uppercase;
    }
    .user .msg-label { align-self: flex-end; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .thinking {
      display: flex;
      gap: 4px;
      padding: 10px 0;
    }
    .thinking span {
      width: 6px; height: 6px;
      background: var(--text-light);
      border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .thinking span:nth-child(1) { animation-delay: -0.32s; }
    .thinking span:nth-child(2) { animation-delay: -0.16s; }

    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1.0); }
    }

    /* ── Responsive ── */
    @media (max-width: 1024px) {
      .voice-panel { width: 40%; }
      .chat-panel { width: 60%; }
    }

    @media (max-width: 768px) {
      body { overflow: auto; }
      .dashboard { flex-direction: column; height: auto; }
      .voice-panel { width: 100%; height: 400px; border-right: none; border-bottom: 1px solid var(--border); }
      .chat-panel { width: 100%; height: 600px; }
    }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <img src="https://www.airtel.in/assets/images/airtel-logo-white.svg" alt="Airtel Logo" class="header-logo" style="filter: invert(1);">
    <h1><span>airtel</span> Vaani 2.0</h1>
    <div id="statusBadge" class="status-badge disconnected">
      <span class="dot"></span>
      <span id="statusText">Disconnected</span>
    </div>
  </div>

  <!-- Dashboard -->
  <div class="dashboard">
    <!-- Left Panel: Voice/Mic -->
    <div class="voice-panel">
      <div class="mic-container">
        <div class="mic-rings">
          <div class="ring" id="ring1"></div>
          <div class="ring" id="ring2"></div>
        </div>
        <button class="mic-btn" id="micBtn" aria-label="Start speaking">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/>
            <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
            <line x1="12" x2="12" y1="19" y2="22"/>
          </svg>
        </button>
        <div class="voice-label" id="micLabel">Tap to speak</div>
      </div>
    </div>

    <!-- Right Panel: Chat -->
    <div class="chat-panel">
      <div class="chat-header">
        <h2>Live Conversation</h2>
      </div>
      <div class="chat-messages" id="chat">
        <!-- Messages will appear here -->
      </div>
    </div>
  </div>

<script>
(function() {
  // ── DOM ──
  const micBtn    = document.getElementById('micBtn');
  const micLabel  = document.getElementById('micLabel');
  const ring1     = document.getElementById('ring1');
  const ring2     = document.getElementById('ring2');
  const chatEl    = document.getElementById('chat');
  const statusBadge = document.getElementById('statusBadge');
  const statusText  = document.getElementById('statusText');

  // ── State ──
  let ws = null;
  let isRecording = false;
  let audioContext = null;
  let mediaStream = null;
  let processor = null;
  let analyser = null;
  let animFrame = null;
  let wsConnected = false;

  // Audio playback
  let playCtx = null;
  const OUTPUT_SAMPLE_RATE = 24000;

  // ── WebSocket ──
  function connectWs() {
    return new Promise((resolve) => {
      if (ws && ws.readyState === WebSocket.OPEN) return resolve(true);

      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}`);
      ws.binaryType = 'arraybuffer';

      ws.onopen = () => {
        wsConnected = true;
        setStatus(true);
        console.log('WebSocket connected');
        resolve(true);
      };

      ws.onmessage = (evt) => {
        if (evt.data instanceof ArrayBuffer) {
          handleAudioData(evt.data);
        } else {
          try {
            const msg = JSON.parse(evt.data);
            handleEvent(msg);
          } catch (e) {
            console.log('Unknown message:', evt.data);
          }
        }
      };

      ws.onclose = () => {
        wsConnected = false;
        setStatus(false);
        console.log('WebSocket closed');
      };

      ws.onerror = (e) => {
        console.error('WebSocket error:', e);
        resolve(false);
      };
    });
  }

  function setStatus(connected) {
    statusBadge.className = 'status-badge ' + (connected ? 'connected' : 'disconnected');
    statusText.textContent = connected ? 'Online' : 'Offline';
  }

  // ── Deepgram Events ──
  function handleEvent(msg) {
    switch (msg.type) {
      case 'ConversationText':
        if (msg.role === 'assistant') {
          addMessage('agent', msg.content);
        } else if (msg.role === 'user') {
          addMessage('user', msg.content);
        }
        break;
      case 'UserStartedSpeaking':
        stopPlayback();
        break;
      case 'Error':
      case 'ServerDisconnected':
        addMessage('system', msg.message || 'Connection lost');
        break;
    }
  }

  // ── Chat ──
  function addMessage(role, text) {
    const wrapper = document.createElement('div');
    wrapper.className = 'msg ' + role;

    if (role !== 'system') {
      const label = document.createElement('div');
      label.className = 'msg-label';
      label.textContent = role === 'agent' ? 'Vaani' : 'You';
      wrapper.appendChild(label);
    }

    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    wrapper.appendChild(bubble);
    
    chatEl.appendChild(wrapper);
    
    // Auto-scroll to bottom
    requestAnimationFrame(() => {
      chatEl.scrollTop = chatEl.scrollHeight;
    });
  }

  // ── Audio Capture ──
  const INPUT_SAMPLE_RATE = 24000;

  async function startRecording() {
    try {
      mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: { channelCount: 1, echoCancellation: true, noiseSuppression: true }
      });

      audioContext = new (window.AudioContext || window.webkitAudioContext)();
      if (audioContext.state === 'suspended') await audioContext.resume();

      const source = audioContext.createMediaStreamSource(mediaStream);
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 256;
      source.connect(analyser);

      processor = audioContext.createScriptProcessor(4096, 1, 1);
      source.connect(processor);
      processor.connect(audioContext.destination);

      processor.onaudioprocess = (e) => {
        if (!isRecording || !ws || ws.readyState !== WebSocket.OPEN) return;
        const float32 = e.inputBuffer.getChannelData(0);
        const ratio = audioContext.sampleRate / INPUT_SAMPLE_RATE;
        let samples;
        if (ratio > 1) {
          const newLen = Math.floor(float32.length / ratio);
          samples = new Float32Array(newLen);
          for (let i = 0; i < newLen; i++) samples[i] = float32[Math.floor(i * ratio)];
        } else {
          samples = float32;
        }
        const int16 = new Int16Array(samples.length);
        for (let i = 0; i < samples.length; i++) {
          const s = Math.max(-1, Math.min(1, samples[i]));
          int16[i] = s < 0 ? s * 0x8000 : s * 0x7FFF;
        }
        ws.send(int16.buffer);
      };

      isRecording = true;
      micBtn.classList.add('active');
      micLabel.textContent = 'Listening...';
      micLabel.classList.add('active');
      updatePulse();
    } catch (err) {
      console.error('Mic error:', err);
    }
  }

  function stopRecording() {
    isRecording = false;
    if (processor) { processor.disconnect(); processor = null; }
    if (audioContext && audioContext.state !== 'closed') { audioContext.close(); audioContext = null; }
    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
    analyser = null;

    ring1.style.transform = 'translate(-50%,-50%) scale(1)';
    ring1.style.opacity = 0;
    ring2.style.transform = 'translate(-50%,-50%) scale(1)';
    ring2.style.opacity = 0;

    micBtn.classList.remove('active');
    micLabel.textContent = 'Tap to speak';
    micLabel.classList.remove('active');
  }

  let isAgentSpeaking = false;
  let agentPulseFrame = null;

  function updatePulse() {
    if ((!isRecording || !analyser) && !isAgentSpeaking) return;
    
    let vol = 0;
    if (isRecording && analyser) {
      const data = new Uint8Array(analyser.frequencyBinCount);
      analyser.getByteFrequencyData(data);
      let sum = 0;
      for (let i = 0; i < data.length; i++) sum += data[i];
      vol = Math.min(sum / data.length / 40, 1);
    } else if (isAgentSpeaking) {
      // Simulate agent pulse
      vol = 0.3 + Math.random() * 0.4;
    }

    ring1.style.transform = `translate(-50%,-50%) scale(${1 + vol * 1.5})`;
    ring1.style.opacity = 0.1 + vol * 0.4;
    ring2.style.transform = `translate(-50%,-50%) scale(${1 + vol * 2.5})`;
    ring2.style.opacity = 0.05 + vol * 0.2;

    animFrame = requestAnimationFrame(updatePulse);
  }

  // ── Audio Playback ──
  let nextPlayTime = 0;

  function ensurePlayCtx() {
    if (!playCtx || playCtx.state === 'closed') {
      playCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: OUTPUT_SAMPLE_RATE });
      nextPlayTime = 0;
    }
    if (playCtx.state === 'suspended') playCtx.resume();
    return playCtx;
  }

  function handleAudioData(buffer) {
    const ctx = ensurePlayCtx();
    const view = new DataView(buffer);
    const length = Math.floor(buffer.byteLength / 2);
    const float32 = new Float32Array(length);
    for (let i = 0; i < length; i++) float32[i] = view.getInt16(i * 2, true) / 32768;

    const audioBuf = ctx.createBuffer(1, float32.length, OUTPUT_SAMPLE_RATE);
    audioBuf.copyToChannel(float32, 0);
    const src = ctx.createBufferSource();
    src.buffer = audioBuf;
    src.connect(ctx.destination);

    const now = ctx.currentTime;
    if (nextPlayTime < now) nextPlayTime = now + 0.1;
    
    src.start(nextPlayTime);
    
    // Set agent speaking state
    isAgentSpeaking = true;
    micLabel.textContent = 'Vaani is speaking...';
    if (!animFrame) updatePulse();

    src.onended = () => {
      const remaining = nextPlayTime - ctx.currentTime;
      if (remaining <= 0) {
        isAgentSpeaking = false;
        if (!isRecording) {
          micLabel.textContent = 'Tap to speak';
          cancelAnimationFrame(animFrame);
          animFrame = null;
          ring1.style.opacity = 0;
          ring2.style.opacity = 0;
        }
      }
    };

    nextPlayTime += audioBuf.duration;
  }

  function stopPlayback() {
    if (playCtx && playCtx.state !== 'closed') {
      playCtx.close();
      playCtx = null;
    }
    nextPlayTime = 0;
  }

  // ── Mic Button ──
  micBtn.addEventListener('click', async () => {
    ensurePlayCtx();

    if (!wsConnected) {
      micLabel.textContent = 'Connecting...';
      const success = await connectWs();
      if (!success) {
        micLabel.textContent = 'Connection Failed';
        return;
      }
    }

    if (isRecording) {
      stopRecording();
    } else {
      await startRecording();
    }
  });

})();
</script>

</body>
</html>
