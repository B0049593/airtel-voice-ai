<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Airtel Vaani 2.0 | Voice AI Assistant</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --airtel-red: #ED1C24;
      --bg-dark: #0F0F0F;
      --card-bg: #1A1A1A;
      --text-white: #FFFFFF;
      --text-gray: #B0B0B0;
      --border: rgba(255, 255, 255, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Outfit', sans-serif;
      background-color: var(--bg-dark);
      color: var(--text-white);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      padding: 20px 40px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-size: 1.5rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-red { color: var(--airtel-red); }
    .status-badge {
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 0.8rem;
      background: rgba(255, 255, 255, 0.05);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #4CAF50;
    }

    /* ── Main Dashboard ── */
    .dashboard {
      flex: 1;
      display: grid;
      grid-template-columns: 1fr 1fr; /* 50% split for static left and scrollable right panels */
      gap: 24px;
      padding: 24px;
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
      height: calc(100vh - 80px); /* Fill remaining space below header */
      overflow: hidden;
    }

    /* ── Left Panel: Voice/Mic ── */
    .voice-panel {
      background: var(--card-bg);
      border-radius: 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      position: relative;
      border: 1px solid var(--border);
      overflow: hidden;
      height: 100%; /* Sized to dashboard height */
    }

    /* Pulse Visuals */
    .mic-section {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 20px;
    }
    .pulse-container {
      position: relative;
      width: 200px;
      height: 200px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 30px;
    }
    .pulse-circle {
      position: absolute;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background: var(--airtel-red);
      opacity: 0;
      transform: scale(0.8);
      pointer-events: none;
      will-change: transform, opacity; /* High performance rendering optimization */
    }
    
    .pulse-icon {
      position: relative;
      z-index: 2;
      width: 100px;
      height: 100px;
      background: white;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--airtel-red);
      font-size: 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      transition: all 0.3s ease;
    }
    .ai-speaking .pulse-icon { color: #1976D2; }
    .user-speaking .pulse-icon { transform: scale(1.1); background: var(--airtel-red); color: white; }

    #statusLabel {
      font-size: 1.1rem;
      color: var(--text-gray);
      font-weight: 500;
    }

    /* ── Controls Bar ── */
    .controls-bar {
      display: flex;
      gap: 16px;
      margin-top: 40px;
    }
    .btn-control {
      padding: 14px 28px;
      border-radius: 30px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 10px;
      border: none;
      font-size: 1rem;
      outline: none;
    }
    .btn-start {
      background: linear-gradient(135deg, #FF4C52 0%, #D82F35 100%);
      color: white;
      box-shadow: 0 4px 15px rgba(255, 76, 82, 0.3);
    }
    .btn-start:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(255, 76, 82, 0.4); }
    .btn-pause { background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255, 255, 255, 0.2); }
    .btn-pause.active { background: #FF9F43; color: white; border-color: #FF9F43; }
    .btn-end { background: #1a1a1a; color: #888; border: 1px solid #333; }
    .btn-control:disabled { opacity: 0.3; cursor: not-allowed; transform: none !important; }

    /* ── Chat Panel ── */
    .chat-panel {
      background: var(--card-bg);
      border-radius: 24px;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      height: 100%; /* Sized to dashboard height */
    }
    .chat-header {
      padding: 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .chat-messages {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .msg { display: flex; flex-direction: column; max-width: 85%; }
    .msg.user { align-self: flex-end; }
    .msg.agent { align-self: flex-start; }
    .bubble {
      padding: 12px 18px;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.4;
    }
    .user .bubble { background: var(--airtel-red); color: white; border-bottom-right-radius: 4px; }
    .agent .bubble { background: rgba(255, 255, 255, 0.05); color: white; border-bottom-left-radius: 4px; border: 1px solid var(--border); }

    /* ── Developer Debug Panel ── */
    .debug-panel {
      position: fixed;
      bottom: 20px;
      right: 20px;
      width: 350px;
      background: #000;
      border: 1px solid #333;
      border-radius: 12px;
      font-family: 'Courier New', Courier, monospace;
      z-index: 100;
      transition: height 0.3s ease;
      overflow: hidden;
    }
    .debug-panel.collapsed { height: 44px; }
    .debug-header {
      padding: 10px 15px;
      background: #222;
      display: flex;
      justify-content: space-between;
      cursor: pointer;
    }
    .debug-logs {
      height: 300px;
      padding: 10px;
      overflow-y: auto;
      font-size: 11px;
    }
    .debug-log-entry { margin-bottom: 4px; border-bottom: 1px solid #111; padding-bottom: 2px; }

    /* Animations */
    .processing .pulse-icon { animation: glow 1.5s infinite; }
    @keyframes glow { 0% { box-shadow: 0 0 10px rgba(255, 76, 82, 0.3); } 50% { box-shadow: 0 0 30px rgba(255, 76, 82, 0.6); } 100% { box-shadow: 0 0 10px rgba(255, 76, 82, 0.3); } }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <i class="fas fa-signal logo-red"></i>
      <span>Airtel <span class="logo-red">Vaani 2.0</span></span>
    </div>
    <div class="status-badge">
      <div class="status-dot"></div>
      <span id="statusText">System Online</span>
    </div>
  </header>

  <div class="dashboard" id="dashboard">
    <div class="voice-panel">
      <div class="mic-section">
        <div class="pulse-container">
          <div class="pulse-circle"></div>
          <div class="pulse-circle"></div>
          <div class="pulse-circle"></div>
          <div class="pulse-icon" id="mainIcon">
            <i class="fas fa-microphone"></i>
          </div>
        </div>
        <div id="statusLabel">Ready to assist</div>
      </div>
      
      <div class="controls-bar">
        <button id="startBtn" class="btn-control btn-start">
          <i class="fas fa-play"></i> Start Conversation
        </button>
        <button id="pauseBtn" class="btn-control btn-pause" disabled>
          <i class="fas fa-pause"></i> Pause
        </button>
        <button id="endBtn" class="btn-control btn-end" disabled>
          <i class="fas fa-stop"></i> End
        </button>
      </div>
    </div>

    <div class="chat-panel">
      <div class="chat-header">
        <h2 style="font-size: 1.1rem; font-weight: 600;">Live Interaction</h2>
        <i class="fas fa-comment-alt" style="color: var(--text-gray);"></i>
      </div>
      <div class="chat-messages" id="chat"></div>
    </div>

    <div class="debug-panel collapsed" id="debugPanel">
      <div class="debug-header" id="debugToggle">
        <h3 style="font-size: 0.8rem; margin: 0;">Dev Debug Console</h3>
        <span id="debugChevron">▾</span>
      </div>
      <div style="padding: 10px; border-bottom: 1px solid #222; font-size: 10px; color: #888;">
        STT: <span id="sttStatus" style="color: #0F0;">Flux V2</span> | 
        LLM: <span id="llmStatus" style="color: #0F0;">GPT-4o-mini</span> | 
        TTS: <span id="ttsStatus" style="color: #0F0;">Aura</span>
      </div>
      <div class="debug-logs" id="debugLogs"></div>
    </div>
  </div>

<script>
(function() {
  const debugMode = true;
  const dashboard = document.getElementById('dashboard');
  const startBtn  = document.getElementById('startBtn');
  const pauseBtn  = document.getElementById('pauseBtn');
  const endBtn    = document.getElementById('endBtn');
  const statusLabel = document.getElementById('statusLabel');
  const mainIcon  = document.getElementById('mainIcon');
  const chatEl    = document.getElementById('chat');
  const debugLogs   = document.getElementById('debugLogs');
  const debugToggle = document.getElementById('debugToggle');
  const debugChevron = document.getElementById('debugChevron');
  const debugPanel = document.getElementById('debugPanel');

  const STATES = {
    IDLE: 'IDLE',
    INITIALIZING: 'INITIALIZING',
    PLAYING_GREETING: 'PLAYING_GREETING',
    LISTENING: 'LISTENING',
    USER_SPEAKING: 'USER_SPEAKING',
    THINKING: 'THINKING',
    AI_SPEAKING: 'AI_SPEAKING',
    PAUSED: 'PAUSED',
    CALL_ENDED: 'CALL_ENDED'
  };

  let currentState = STATES.IDLE;
  let ws = null;
  let isListening = false;
  let isPaused = false;
  let isGreetingMode = false;
  let isAgentSpeaking = false;
  let audioContext = null;
  let mediaStream = null;
  let processor = null;
  let analyser = null;
  let aiAnalyser = null;
  let vadDataArray = null;
  let isUserActuallySpeaking = false;
  let playCtx = null;
  const OUTPUT_SAMPLE_RATE = 24000;
  let nextPlayTime = 0;
  let activeSources = [];
  let ignoreAudio = false;

  // Visualizer state variables
  let smoothedUserVolume = 0;
  let smoothedAiVolume = 0;
  let lastUserSpeechLoggedTime = 0;
  let lastAiSpeechLoggedTime = 0;

  function log(tag, message, isError = false) {
    if (!debugMode) return;
    const time = new Date().toLocaleTimeString([], { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
    const entry = document.createElement('div');
    entry.className = 'debug-log-entry';
    entry.innerHTML = `<span style="color:#888">${time}</span> <span style="color:${isError?'#FF4C52':'#00FF00'}">[${tag}]</span> <span>${message}</span>`;
    debugLogs.prepend(entry);
    if (debugLogs.children.length > 50) debugLogs.lastChild.remove();
  }

  // Initialize fixed layout trace on startup
  log('LAYOUT', 'Left panel fixed');
  console.log('[LAYOUT] Left panel fixed');

  debugToggle.addEventListener('click', () => {
    const isCollapsed = debugPanel.classList.toggle('collapsed');
    debugChevron.textContent = isCollapsed ? '▾' : '▴';
  });

  function setState(newState) {
    if (currentState === newState) return;
    currentState = newState;
    log('STATE', `Transition → ${newState}`);
    updateUIState();
  }

  function updateUIState() {
    dashboard.classList.remove('listening', 'user-speaking', 'ai-speaking', 'processing', 'paused');
    startBtn.disabled = (currentState !== STATES.IDLE && currentState !== STATES.CALL_ENDED);
    pauseBtn.disabled = (currentState === STATES.IDLE || currentState === STATES.INITIALIZING || currentState === STATES.CALL_ENDED);
    endBtn.disabled   = (currentState === STATES.IDLE || currentState === STATES.CALL_ENDED);

    pauseBtn.innerHTML = isPaused ? '<i class="fas fa-play"></i> Resume' : '<i class="fas fa-pause"></i> Pause';
    pauseBtn.classList.toggle('active', isPaused);

    switch (currentState) {
      case STATES.IDLE: statusLabel.textContent = 'Ready to assist'; break;
      case STATES.INITIALIZING: statusLabel.textContent = 'Connecting to Vaani...'; break;
      case STATES.PLAYING_GREETING:
      case STATES.AI_SPEAKING:
        dashboard.classList.add('ai-speaking');
        statusLabel.textContent = 'Vaani is speaking...';
        mainIcon.innerHTML = '<i class="fas fa-headset"></i>';
        break;
      case STATES.LISTENING:
        dashboard.classList.add('listening');
        statusLabel.textContent = 'Listening...';
        mainIcon.innerHTML = '<i class="fas fa-microphone"></i>';
        break;
      case STATES.USER_SPEAKING:
        dashboard.classList.add('listening', 'user-speaking');
        statusLabel.textContent = 'Listening...';
        mainIcon.innerHTML = '<i class="fas fa-microphone"></i>';
        break;
      case STATES.THINKING:
        dashboard.classList.add('processing');
        statusLabel.textContent = 'Vaani is thinking...';
        break;
      case STATES.PAUSED:
        dashboard.classList.add('paused');
        statusLabel.textContent = 'Conversation paused';
        break;
      case STATES.CALL_ENDED: statusLabel.textContent = 'Session ended'; break;
    }
  }

  async function connectWs() {
    return new Promise((resolve) => {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}`);
      ws.binaryType = 'arraybuffer';
      ws.onopen = () => resolve(true);
      ws.onmessage = (evt) => {
        if (evt.data instanceof ArrayBuffer) handleAudioData(evt.data);
        else handleEvent(JSON.parse(evt.data));
      };
      ws.onerror = () => resolve(false);
      ws.onclose = () => resetToIdle();
    });
  }

  function handleEvent(msg) {
    if (msg.type === 'UserStartedSpeaking' || msg.type === 'SpeechStarted') { 
      log('EVENT', 'User started speaking (Barge-in detected)');
      ignoreAudio = true;
      stopPlayback(); 
      isGreetingMode = false;
      isAgentSpeaking = false;
      setState(STATES.USER_SPEAKING); 
    }
    else if (msg.type === 'AgentThinking') {
      log('EVENT', 'Agent is thinking');
      ignoreAudio = false;
      setState(STATES.THINKING);
    }
    else if (msg.type === 'AgentStartedSpeaking') {
      log('EVENT', 'Agent started speaking');
      ignoreAudio = false;
      isAgentSpeaking = true;
      setState(STATES.AI_SPEAKING);
    }
    else if (msg.type === 'AgentAudioDone') {
      log('EVENT', 'Agent finished generating audio');
      if (activeSources.length === 0) {
        setState(STATES.LISTENING);
      }
    }
    else if (msg.type === 'ConversationText') {
      if (msg.role === 'user') {
        log('EVENT', 'User speech transcription finalized');
        setState(STATES.THINKING);
      } else if (msg.role === 'assistant') {
        log('EVENT', 'Agent response transcription started');
        ignoreAudio = false;
        isAgentSpeaking = true;
        setState(STATES.AI_SPEAKING);
      }
      addMessage(msg.role === 'assistant' ? 'agent' : 'user', msg.content);
    }
  }

  function addMessage(role, text) {
    const wrapper = document.createElement('div');
    wrapper.className = 'msg ' + role;
    wrapper.innerHTML = `<div class="bubble">${text}</div>`;
    chatEl.appendChild(wrapper);
    
    // Smooth scrolling locally inside the container
    chatEl.scrollTo({
      top: chatEl.scrollHeight,
      behavior: 'smooth'
    });
    
    log('CHAT', 'Auto-scroll triggered');
    console.log('[CHAT] Auto-scroll triggered');
  }

  async function startListening() {
    try {
      log('AUDIO', 'Requesting microphone access with echo cancellation');
      mediaStream = await navigator.mediaDevices.getUserMedia({
        audio: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true
        }
      });
      audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 24000 });
      const source = audioContext.createMediaStreamSource(mediaStream);
      analyser = audioContext.createAnalyser();
      analyser.fftSize = 256;
      vadDataArray = new Uint8Array(analyser.frequencyBinCount);
      processor = audioContext.createScriptProcessor(1024, 1, 1);
      source.connect(analyser);
      source.connect(processor);
      processor.connect(audioContext.destination);
      processor.onaudioprocess = (e) => {
        // Continuous mic streaming: removed isGreetingMode check to allow barge-in during greeting
        if (!isListening || isPaused || !ws || ws.readyState !== WebSocket.OPEN) return;
        const float32 = e.inputBuffer.getChannelData(0);
        const int16 = new Int16Array(float32.length);
        for (let i = 0; i < float32.length; i++) int16[i] = Math.max(-1, Math.min(1, float32[i])) * 0x7FFF;
        ws.send(int16.buffer);
      };
      isListening = true;
    } catch (e) {
      log('ERROR', 'Mic failed: ' + e.message, true);
    }
  }

  function handleAudioData(buffer) {
    if (ignoreAudio || isPaused) {
      log('AUDIO', 'Discarded stale/in-flight audio buffer');
      return;
    }

    if (!playCtx) { 
      playCtx = new AudioContext({ sampleRate: OUTPUT_SAMPLE_RATE }); 
      aiAnalyser = playCtx.createAnalyser();
      aiAnalyser.fftSize = 256;
      nextPlayTime = 0; 
    }
    
    if (playCtx.state === 'suspended') {
      playCtx.resume();
    }

    const audioBuf = playCtx.createBuffer(1, buffer.byteLength / 2, OUTPUT_SAMPLE_RATE);
    const float32 = new Float32Array(buffer.byteLength / 2);
    const view = new DataView(buffer);
    for (let i = 0; i < float32.length; i++) float32[i] = view.getInt16(i * 2, true) / 32768;
    audioBuf.copyToChannel(float32, 0);
    
    const src = playCtx.createBufferSource();
    src.buffer = audioBuf;
    
    // Connect buffer source to AI analyser and then to playCtx destination
    src.connect(aiAnalyser);
    aiAnalyser.connect(playCtx.destination);
    
    const now = playCtx.currentTime;
    if (nextPlayTime < now) nextPlayTime = now;
    src.start(nextPlayTime);
    
    activeSources.push(src);
    
    if (isGreetingMode) {
      setState(STATES.PLAYING_GREETING);
    } else {
      isAgentSpeaking = true;
      setState(STATES.AI_SPEAKING);
    }

    src.onended = () => {
      const idx = activeSources.indexOf(src);
      if (idx > -1) activeSources.splice(idx, 1);

      if (activeSources.length === 0 && currentState !== STATES.USER_SPEAKING && !isPaused) {
        if (isGreetingMode) {
          isGreetingMode = false;
        }
        setState(STATES.LISTENING);
      }
    };
    nextPlayTime += audioBuf.duration;
  }

  function stopPlayback() {
    log('AUDIO', `Stopping playback of ${activeSources.length} active/scheduled audio sources`);
    activeSources.forEach(src => {
      try {
        src.stop();
      } catch (e) {
        // Already stopped or not started
      }
    });
    activeSources = [];
    nextPlayTime = 0;
    isAgentSpeaking = false;
  }

  function resetToIdle() {
    isListening = false;
    isGreetingMode = false;
    isPaused = false;
    isAgentSpeaking = false;
    ignoreAudio = false;
    if (ws) { ws.close(); ws = null; }
    if (processor) { processor.disconnect(); processor = null; }
    if (analyser) { analyser.disconnect(); analyser = null; }
    if (audioContext) { audioContext.close(); audioContext = null; }
    if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
    stopPlayback();
    if (playCtx) {
      playCtx.close();
      playCtx = null;
    }
    setState(STATES.IDLE);
  }

  // Unified voice-reactive visualizer loop
  function startVisualizerLoop() {
    const updateVisualizer = () => {
      let volume = 0;

      // 1. User speaking dynamic analysis
      if (isListening && !isPaused && analyser) {
        const array = new Uint8Array(analyser.frequencyBinCount);
        analyser.getByteTimeDomainData(array);
        let sum = 0;
        for (let i = 0; i < array.length; i++) {
          const v = (array[i] - 128) / 128;
          sum += v * v;
        }
        const rms = Math.sqrt(sum / array.length);

        // Filter out background noise floor
        const threshold = 0.02;
        const rawVol = rms > threshold ? rms : 0;
        smoothedUserVolume = smoothedUserVolume * 0.75 + rawVol * 0.25;

        // VAD Trigger
        const speaking = smoothedUserVolume > 0.015;
        if (speaking !== isUserActuallySpeaking) {
          isUserActuallySpeaking = speaking;
          if (isUserActuallySpeaking) {
            if (currentState !== STATES.PLAYING_GREETING && currentState !== STATES.AI_SPEAKING) {
              setState(STATES.USER_SPEAKING);
            }
          } else {
            if (currentState === STATES.USER_SPEAKING) {
              setState(STATES.LISTENING);
            }
          }
        }

        if (currentState === STATES.USER_SPEAKING) {
          volume = smoothedUserVolume;
          const now = Date.now();
          if (now - lastUserSpeechLoggedTime > 1500) {
            log('VAD', 'User speech detected');
            log('UI', 'Pulse animation activated');
            console.log('[VAD] User speech detected');
            console.log('[UI] Pulse animation activated');
            lastUserSpeechLoggedTime = now;
          }
        }
      }

      // 2. AI speaking playback dynamic analysis
      if ((currentState === STATES.AI_SPEAKING || currentState === STATES.PLAYING_GREETING) && aiAnalyser) {
        const array = new Uint8Array(aiAnalyser.frequencyBinCount);
        aiAnalyser.getByteTimeDomainData(array);
        let sum = 0;
        for (let i = 0; i < array.length; i++) {
          const v = (array[i] - 128) / 128;
          sum += v * v;
        }
        const rms = Math.sqrt(sum / array.length);

        smoothedAiVolume = smoothedAiVolume * 0.8 + rms * 0.2;
        volume = smoothedAiVolume;

        if (volume > 0.01) {
          const now = Date.now();
          if (now - lastAiSpeechLoggedTime > 1500) {
            log('TTS', 'AI speaking animation active');
            log('UI', 'Pulse animation activated');
            console.log('[TTS] AI speaking animation active');
            console.log('[UI] Pulse animation activated');
            lastAiSpeechLoggedTime = now;
          }
        }
      }

      // 3. Render dynamic pulse animation states
      const circles = document.querySelectorAll('.pulse-circle');

      if (currentState === STATES.USER_SPEAKING) {
        circles.forEach((circle, index) => {
          circle.style.backgroundColor = 'var(--airtel-red)';
          const factor = (index + 1) * 0.5;
          const scale = 1.0 + volume * 5.0 * factor;
          const opacity = Math.min(0.8, volume * 4.0) / (index + 1);

          circle.style.transform = `scale(${scale})`;
          circle.style.opacity = volume > 0.01 ? opacity : 0;
          circle.style.transition = 'transform 0.05s ease-out, opacity 0.05s ease-out';
        });
      } else if (currentState === STATES.AI_SPEAKING || currentState === STATES.PLAYING_GREETING) {
        circles.forEach((circle, index) => {
          circle.style.backgroundColor = '#1976D2'; // Premium Blue
          const factor = (index + 1) * 0.5;
          const scale = 1.0 + volume * 4.5 * factor;
          const opacity = Math.min(0.7, volume * 3.5) / (index + 1);

          circle.style.transform = `scale(${scale})`;
          circle.style.opacity = volume > 0.01 ? opacity : 0;
          circle.style.transition = 'transform 0.08s ease-out, opacity 0.08s ease-out';
        });
      } else if (currentState === STATES.THINKING || currentState === STATES.INITIALIZING) {
        // Breathing glow effect
        const time = Date.now() * 0.003;
        const breathe = Math.sin(time) * 0.5 + 0.5; // 0 to 1
        circles.forEach((circle, index) => {
          circle.style.backgroundColor = 'var(--airtel-red)';
          const scale = 1.0 + breathe * 0.25 * (index + 1) * 0.4;
          const opacity = 0.1 + breathe * 0.15 / (index + 1);

          circle.style.transform = `scale(${scale})`;
          circle.style.opacity = opacity;
          circle.style.transition = 'transform 0.1s linear, opacity 0.1s linear';
        });
      } else {
        // IDLE, PAUSED, CALL_ENDED: static mic, no pulse
        circles.forEach(circle => {
          circle.style.transform = 'scale(0.8)';
          circle.style.opacity = 0;
          circle.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
        });
      }

      requestAnimationFrame(updateVisualizer);
    };
    requestAnimationFrame(updateVisualizer);
  }

  // Start visualizer loop on load
  startVisualizerLoop();

  // Button Event Listeners
  startBtn.addEventListener('click', async () => {
    log('SESSION', 'Conversation started');
    setState(STATES.INITIALIZING);
    const success = await connectWs();
    if (success) {
      isGreetingMode = true;
      startListening();
      log('TTS', 'Welcome prompt triggered');
    } else {
      log('ERROR', 'Connection failed', true);
      setState(STATES.IDLE);
    }
  });

  pauseBtn.addEventListener('click', async () => {
    isPaused = !isPaused;
    if (isPaused) {
      log('SESSION', 'Paused');
      setState(STATES.PAUSED);
    } else {
      log('SESSION', 'Resumed');
      if (audioContext && audioContext.state === 'suspended') await audioContext.resume();
      if (playCtx && playCtx.state === 'suspended') await playCtx.resume();
      setState(isAgentSpeaking ? STATES.AI_SPEAKING : STATES.LISTENING);
    }
  });

  endBtn.addEventListener('click', () => {
    log('SESSION', 'Ended');
    setState(STATES.CALL_ENDED);
    setTimeout(resetToIdle, 1000);
  });

})();
</script>
</body>
</html>
